server:
  port: 8088

spring.datasource.url: jdbc:mysql://127.0.0.1:3306/ticketdb?useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&useSSL=false
spring.datasource.username: root
spring.datasource.password: 1234
spring.datasource.driver-class-name: com.mysql.cj.jdbc.Driver

# 使用阿里云 DashScope
langchain4j:
  community:
    dashscope:
      # Embedding 模型配置（用于向量化）
      embedding-model:
        api-key: "sk-9af2437b168f4e28bc5709ed5cc6cd54"  # 替换成你复制的完整 Key
        model-name: "text-embedding-v2"

      # 聊天模型配置
      chat-model:
        api-key: "sk-9af2437b168f4e28bc5709ed5cc6cd54"  # 使用同一个 Key
        model-name: "qwen-turbo"  # 免费模型
        temperature: 0.7

      # 流式聊天模型
      streaming-chat-model:
        api-key: "sk-9af2437b168f4e28bc5709ed5cc6cd54"
        model-name: "qwen-turbo"